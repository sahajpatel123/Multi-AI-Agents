  <body>
    <style>
      #initial-loader {
        position: fixed;
        inset: 0;
        background: #FAF7F4;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 300ms ease;
      }
      #initial-loader.hidden {
        opacity: 0;
        pointer-events: none;
      }
      .loader-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #C4956A;
        animation: loaderBreathe 1.5s ease-in-out infinite;
      }
      @keyframes loaderBreathe {
        0%, 100% { 
          transform: scale(1);
          opacity: 0.4;
        }
        50% { 
          transform: scale(1.5);
          opacity: 1;
        }
      }
    </style>

    <div id="initial-loader">
      <div class="loader-dot"></div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
