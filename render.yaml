services:
  # Backend API service
  - type: web
    name: multi-agents-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    # migrate_and_start runs additive schema migrations then execs uvicorn.
    # Degraded mode is intentional when Postgres is briefly unreachable so
    # the process still binds $PORT and Render's health probe can succeed.
    startCommand: python migrate_and_start.py
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: ENVIRONMENT
        value: production
      - key: SECRET_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: GROK_API_KEY
        sync: false
      - key: DEEPSEEK_API_KEY
        sync: false
      # Prefer the Render *Internal* Database URL when the DB is on Render
      # (same region). External/public IPs (e.g. 35.x.x.x) often fail with
      # "SSL connection has been closed unexpectedly" mid-handshake.
      # Paste Internal URL from the Postgres dashboard → Connections.
      - key: DATABASE_INTERNAL_URL
        sync: false
      # Keep the external/public URL available for tooling and migration
      # inspection. The runtime engine prefers DATABASE_INTERNAL_URL above.
      - key: DATABASE_URL
        sync: false
      # Public HTTPS origin of the SPA, e.g. https://your-app.vercel.app
      - key: ALLOWED_ORIGINS
        sync: false
      # Public HTTPS frontend URL for share/invite links.
      # If omitted, the first non-localhost https origin in ALLOWED_ORIGINS
      # is used automatically in production.
      - key: FRONTEND_PUBLIC_URL
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ENCRYPTION_KEY
        sync: false

  # Frontend static site
  - type: static_site
    name: multi-agents-frontend
    rootDir: web/frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: VITE_API_URL
        sync: false
