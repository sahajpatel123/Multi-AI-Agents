name: Dependabot

on:
  schedule:
    interval: weekly
  open-pull-requests-limit: 10

updates:
  - package-ecosystem: pip
    directory: /web/backend
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: America/New_York
    reviewers:
      - sahajpatel123
    labels:
      - dependencies
      - security

  - package-ecosystem: npm
    directory: /web/frontend
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: America/New_York
    reviewers:
      - sahajpatel123
    labels:
      - dependencies
      - security