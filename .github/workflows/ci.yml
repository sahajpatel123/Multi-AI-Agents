name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-flight runs of the same branch when a new commit lands.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (pytest + compileall + security)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web/backend
    env:
      SECRET_KEY: test-secret-key-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
      ANTHROPIC_API_KEY: sk-ant-test-fake-key-for-ci
      OPENAI_API_KEY: sk-test-fake-key-for-ci
      ALLOWED_ORIGINS: http://localhost:5173
      ENVIRONMENT: development
      DATABASE_URL: sqlite:///./arena_ci.db
      ENCRYPTION_KEY: yFosmwgHKj-5dIFtmC5tl6yEWawwqRqZwE749ltw5Mc=
      RAZORPAY_API_KEY: rzp_test_dummy
      RAZORPAY_KEY_SECRET: dummy_secret
      RAZORPAY_WEBHOOK_SECRET: dummy_webhook
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: web/backend/requirements.txt

      - name: Install libmagic (required by python-magic)
        run: sudo apt-get update && sudo apt-get install -y libmagic1

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Security scan (pip-audit)
        run: |
          pip install pip-audit
          pip-audit --ignore-vuln 2024-13894 --ignore-vuln 2024-13895 -r requirements.txt || true

      - name: Compile check
        run: python -m compileall -q arena

      - name: Test (pytest)
        run: pytest -q --no-header

  frontend:
    name: Frontend (vitest + tsc + build + security)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web/frontend
    steps:
      - uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Security audit (npm audit)
        run: npm audit --audit-level=high

      - name: Type check (tsc)
        run: npx tsc --noEmit

      - name: Vitest
        run: npm test

      - name: Build
        run: npm run build

  e2e:
    name: E2E (Playwright smoke)
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    defaults:
      run:
        working-directory: web/frontend
    env:
      SECRET_KEY: test-secret-key-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
      ANTHROPIC_API_KEY: sk-ant-test-fake-key-for-ci
      OPENAI_API_KEY: sk-test-fake-key-for-ci
      ALLOWED_ORIGINS: http://localhost:5173
      ENVIRONMENT: development
      DATABASE_URL: sqlite:///./arena_ci.db
      ENCRYPTION_KEY: yFosmwgHKj-5dIFtmC5tl6yEWawwqRqZwE749ltw5Mc=
      RAZORPAY_API_KEY: rzp_test_dummy
      RAZORPAY_KEY_SECRET: dummy_secret
      RAZORPAY_WEBHOOK_SECRET: dummy_webhook
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: "20"

      - name: Install libmagic
        run: sudo apt-get update && sudo apt-get install -y libmagic1

      - name: Install backend dependencies
        working-directory: web/backend
        run: pip install -r requirements.txt

      - name: Install frontend dependencies
        working-directory: web/frontend
        run: npm ci

      - name: Install Playwright
        run: npm install --no-save @playwright/test && npx playwright install --with-deps chromium

      - name: Start backend
        working-directory: web/backend
        run: |
          nohup python main.py > /tmp/backend.log 2>&1 &
          sleep 5

      - name: Run Playwright tests
        run: npx playwright test

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: web/frontend/playwright-report
          retention-days: 7