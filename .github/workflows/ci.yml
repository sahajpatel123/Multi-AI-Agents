name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-flight runs of the same branch when a new commit lands.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (pytest + compileall + security)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      SECRET_KEY: test-secret-key-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
      ANTHROPIC_API_KEY: sk-ant-test-fake-key-for-ci
      OPENAI_API_KEY: sk-test-fake-key-for-ci
      ALLOWED_ORIGINS: http://localhost:5173
      ENVIRONMENT: development
      DATABASE_URL: sqlite:///./arena_ci.db
      # ENCRYPTION_KEY is generated at runtime below to keep the workflow
      # file free of any hardcoded Fernet key (gitleaks flags 44-char
      # base64 strings as generic-api-key regardless of entropy origin).
      RAZORPAY_API_KEY: rzp_test_dummy
      RAZORPAY_KEY_SECRET: dummy_secret
      RAZORPAY_WEBHOOK_SECRET: dummy_webhook
    steps:
      - uses: actions/checkout@v7
        with:
          # Gitleaks below scans `git log <prev_sha>^..HEAD`; the
          # default fetch-depth: 1 leaves <prev_sha>^ unresolved so
          # the diff is empty AND the action exits non-zero. fetch-depth: 2
          # is just enough for a single-commit push, but breaks again on
          # multi-commit pushes (e.g. two commits in a row — the ^ of the
          # second-newest SHA isn't in the clone). 10 covers up to 9-commit
          # pushes; bigger ones are rare and we can revisit.
          fetch-depth: 10

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install libmagic (required by python-magic)
        run: sudo apt-get update && sudo apt-get install -y libmagic1

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Generate runtime encryption key
        # Produce a fresh Fernet key per CI run so the workflow file never
        # contains a long-lived credential. The key is exposed to later
        # steps via $GITHUB_ENV.
        run: |
          pip install cryptography
          KEY=$(python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())")
          echo "ENCRYPTION_KEY=$KEY" >> "$GITHUB_ENV"

      - name: Security scan (pip-audit)
        run: |
          pip install pip-audit
          # Scan requirements.txt directly so we cover every dependency,
          # not just what happens to be installed in the CI environment.
          # A HIGH/CRITICAL finding now FAILS the build. The pin-floor
          # guard in the next step locks the direct-dep security floor,
          # so individual --ignore-vuln entries are reserved for transitive
          # deps where upstream has no fix planned. python-jose's transitive
          # ecdsa (PYSEC-2026-1325, Minerva) was eliminated entirely by the
          # python-jose -> PyJWT 2.13.0 migration in e9d4e2e + dd11ffc, so
          # no ignore is needed anymore.
          pip-audit -r requirements.txt

      - name: Pin floor guard (security-required versions)
        run: |
          # Defense-in-depth: even if a future pip-audit database update
          # silently drops a vulnerable-package match, the package FLOOR
          # below must stay. A regression to any older pin fails the build.
          python -c "
          import re, sys
          REQUIRED = {
              'fastapi':       '0.139.2',
              'pyasn1':        '0.6.4',
              'PyJWT':         '2.13.0',
              'python-multipart': '0.0.32',
              'cryptography':  '48.0.1',
              'Pillow':        '12.3.0',
              'python-dotenv': '1.2.2',
              'markdown':      '3.8.1',
              'weasyprint':    '69.0',
              'pytest':        '9.0.3',
          }
          text = open('requirements.txt').read()
          failures = []
          for pkg, min_ver in REQUIRED.items():
              pattern = rf'^{re.escape(pkg)}(?:\[.*?\])?==(\d+(?:\.\d+)+)'
              match = re.search(pattern, text, re.MULTILINE)
              if not match:
                  failures.append(f'MISSING: {pkg}=={min_ver}')
                  continue
              current = tuple(int(x) for x in match.group(1).split('.'))
              floor   = tuple(int(x) for x in min_ver.split('.'))
              if current < floor:
                  failures.append(f'REGRESSED: {pkg}=={match.group(1)} (require >= {min_ver})')
          # Negative-pin guard: packages that MUST NOT appear in
          # requirements.txt. python-jose pulls ecdsa 0.19.2 (PYSEC-2026-1325,
          # Minerva timing attack) and was eliminated in cycle 1 in favor of
          # PyJWT. Reintroducing it would silently re-expose the vuln that
          # pip-audit catches via the broader scan above — but this guard
          # fails faster and produces a clearer message.
          FORBIDDEN = {
              'python-jose': 'pulls ecdsa 0.19.2 (PYSEC-2026-1325); use PyJWT',
              'ecdsa':       'transitive of python-jose; eliminated via PyJWT in cycle 1',
          }
          forbidden_hits = []
          for pkg, why in FORBIDDEN.items():
              pattern = rf'^{re.escape(pkg)}(?:\[.*?\])?(?:==|>=|~=|@)'
              if re.search(pattern, text, re.MULTILINE):
                  forbidden_hits.append(f'FORBIDDEN: {pkg} — {why}')
          if failures or forbidden_hits:
              print('Security floor violations:')
              for f in failures:
                  print(f'  - {f}')
              for f in forbidden_hits:
                  print(f'  - {f}')
              sys.exit(1)
          print('Security floor OK')
          "

      - name: Secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml

      - name: Compile check
        run: python -m compileall -q arena

      - name: Test (pytest)
        run: pytest -q --no-header

  frontend:
    name: Frontend (vitest + tsc + build + security)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web/frontend
    steps:
      - uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Security audit (npm audit)
        run: |
          # Audit ALL deps (no --omit=dev) at HIGH+ severity. A finding
          # now FAILS the build — dependabot covers routine bumps, but
          # upstream-theft and freshly-disclosed React Router / PostCSS
          # RCE-class bugs need an immediate gate.
          npm audit --audit-level=high

      - name: Pin floor guard (security-required versions)
        run: |
          # Defense-in-depth for packages with a security history in this
          # repo. A downgrade below the floor fails the build, matching
          # the backend's pin guard at ci.yml:69.
          node -e "
          const fs = require('fs');
          const REQUIRED = {
            'react-router-dom': '7.14.2',
            'postcss':         '8.5.14',
            'vitest':          '4.1.10',
          };
          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          const merged = { ...(pkg.dependencies || {}), ...(pkg.devDependencies || {}) };
          const failures = [];
          for (const [name, minVer] of Object.entries(REQUIRED)) {
            const raw = merged[name];
            if (raw === undefined) { failures.push('MISSING: ' + name + '>=' + minVer); continue; }
            // strip leading ^ or ~ to compare on the floor
            const m = raw.match(/^[\^~]?(\d+(?:\.\d+)+)/);
            if (!m) { failures.push('UNPARSED: ' + name + ' = ' + raw); continue; }
            const cur = m[1].split('.').map(Number);
            const floor = minVer.split('.').map(Number);
            const pad = (a, n) => a.concat(Array(Math.max(0, n - a.length)).fill(0));
            for (let i = 0; i < Math.max(cur.length, floor.length); i++) {
              const c = pad(cur, floor.length)[i];
              const f = pad(floor, cur.length)[i];
              if (c > f) break;
              if (c < f) { failures.push('REGRESSED: ' + name + '@' + m[1] + ' (require >= ' + minVer + ')'); break; }
            }
          }
          if (failures.length) {
            console.error('Security floor violations:');
            failures.forEach(f => console.error('  - ' + f));
            process.exit(1);
          }
          console.log('Security floor OK');
          "

      - name: Type check (tsc)
        run: npx tsc --noEmit

      - name: Vitest
        run: npm test

      - name: Build
        run: npm run build

  e2e:
    name: E2E (Playwright smoke)
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    defaults:
      run:
        working-directory: web/frontend
    env:
      SECRET_KEY: test-secret-key-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
      ANTHROPIC_API_KEY: sk-ant-test-fake-key-for-ci
      OPENAI_API_KEY: sk-test-fake-key-for-ci
      ALLOWED_ORIGINS: http://localhost:5173
      ENVIRONMENT: development
      DATABASE_URL: sqlite:///./arena_ci.db
      # ENCRYPTION_KEY is generated at runtime below to avoid committing
      # a long-lived Fernet key in the workflow file.
      RAZORPAY_API_KEY: rzp_test_dummy
      RAZORPAY_KEY_SECRET: dummy_secret
      RAZORPAY_WEBHOOK_SECRET: dummy_webhook
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: "20"

      - name: Install libmagic
        run: sudo apt-get update && sudo apt-get install -y libmagic1

      - name: Install backend dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Generate runtime encryption key
        working-directory: backend
        run: |
          KEY=$(python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())")
          echo "ENCRYPTION_KEY=$KEY" >> "$GITHUB_ENV"

      - name: Install frontend dependencies
        working-directory: web/frontend
        run: npm ci

      - name: Install Playwright
        run: npm install --no-save @playwright/test && npx playwright install --with-deps chromium

      - name: Start backend
        working-directory: backend
        run: |
          nohup python main.py > /tmp/backend.log 2>&1 &
          # Wait for backend to be ready instead of fixed sleep.
          # /api/health is the public unauthenticated probe (no "ok" string,
          # just a JSON status field) since ci.yml's earlier /api/health split
          # moved uptime/version/etc. behind the authenticated /api/health/detailed.
          for i in {1..30}; do
            if curl -s -o /tmp/health.json -w '%{http_code}' http://localhost:8000/api/health | grep -q '^200$' \
               && grep -q '"status":"healthy"' /tmp/health.json; then
              echo "Backend ready"
              exit 0
            fi
            sleep 1
          done
          echo "Backend failed to start"
          cat /tmp/backend.log
          exit 1

      - name: Run Playwright tests
        # --reporter=line streams concise progress to the GitHub log,
        # --reporter=json writes machine-readable results/playwright-report.json
        # so the failure-upload step has structured data to inspect (and so
        # dependabot/code-review bots can render the failures as a PR comment).
        run: npx playwright test --reporter=line,json

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          # Upload BOTH the HTML report (browse in the Actions UI) and the
          # raw JSON results + any failure screenshots/traces the runner
          # captured. Without the JSON, post-mortem on flaky tests requires
          # re-running locally — the JSON is the source of truth.
          name: playwright-report
          path: |
            web/frontend/playwright-report
            web/frontend/test-results
          retention-days: 14
          if-no-files-found: warn