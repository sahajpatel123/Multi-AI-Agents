<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Arena — Four minds. One question.</title>
    <meta name="description" content="Arena — Four AI minds with opposing worldviews compete to answer your question. The best answer wins." />
    <meta name="keywords" content="AI, debate, multiple perspectives, Arena, artificial intelligence" />
    <meta property="og:title" content="Arena — Four minds. One question." />
    <meta property="og:description" content="Four AI personalities compete to answer your question. Scored on logic, directness, and originality." />
    <meta property="og:type" content="website" />
    <!-- Share-preview card. SVG is rendered by GitHub/Slack/Discord/LinkedIn.
         Twitter prefers PNG; run `python tools/generate_og_image.py` from
         backend/ once to also produce og-image.png and update the asset
         tag below. -->
    <meta property="og:image" content="/og-image.svg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Arena — four AI minds compete to answer your question." />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Arena" />
    <meta name="twitter:description" content="Four AI minds. One question. The best answer wins." />
    <meta name="twitter:image" content="/og-image.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <meta name="theme-color" content="#0A0E14">
  </head>
  <body>
    <style>
      #initial-loader {
        position: fixed;
        inset: 0;
        background: #0A0E14;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 18px;
        z-index: 9999;
        transition: opacity 400ms ease;
        font-family: 'JetBrains Mono', ui-monospace, monospace;
      }
      #initial-loader.hidden { opacity: 0; pointer-events: none; }
      .loader-brand {
        font-family: 'Space Grotesk', sans-serif;
        font-size: 22px;
        font-weight: 600;
        color: #E6EDF3;
        letter-spacing: -0.01em;
        display: flex; align-items: center; gap: 10px;
      }
      .loader-brand-dot {
        width: 9px; height: 9px; border-radius: 50%;
        background: #7DD3C0;
        box-shadow: 0 0 12px 1px rgba(125,211,192,0.6);
        animation: loaderBreathe 1.6s ease-in-out infinite;
      }
      .loader-bars {
        display: flex; gap: 4px; align-items: flex-end; height: 18px;
      }
      .loader-bars span {
        width: 3px; background: #7DD3C0; border-radius: 2px;
        animation: loaderBars 1.2s ease-in-out infinite;
      }
      .loader-bars span:nth-child(1){ animation-delay: 0ms; }
      .loader-bars span:nth-child(2){ animation-delay: 120ms; }
      .loader-bars span:nth-child(3){ animation-delay: 240ms; }
      .loader-bars span:nth-child(4){ animation-delay: 360ms; }
      @keyframes loaderBreathe {
        0%, 100% { transform: scale(1); opacity: 0.5; }
        50% { transform: scale(1.5); opacity: 1; }
      }
      @keyframes loaderBars {
        0%, 100% { height: 4px; opacity: 0.4; }
        50% { height: 18px; opacity: 1; }
      }
      .loader-caption {
        font-size: 10px; color: #6B7785; letter-spacing: 0.24em;
        text-transform: uppercase;
      }
    </style>

    <div id="initial-loader">
      <div class="loader-brand"><span class="loader-brand-dot"></span>Arena</div>
      <div class="loader-bars"><span></span><span></span><span></span><span></span></div>
      <div class="loader-caption">Establishing signal</div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
