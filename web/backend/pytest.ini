[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -ra
    --strict-markers
    --tb=short
    --disable-warnings
markers =
    slow: marks tests as slow (deselect with -m 'not slow')
    integration: marks tests that require the full app stack
    asyncio: marks tests that use pytest-asyncio
filterwarnings =
    ignore::DeprecationWarning:botocore.*
    ignore::DeprecationWarning:s3transfer.*